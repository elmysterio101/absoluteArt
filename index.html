<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="css/styles.css">
    <title>Absolute Art</title>
</head>

<body>
    <div class="configuracionCapa" id=""  style = "display: none;">
        <div class="opacidadCapa"> 
            <div class="configCapa">
                <div class="atributoCapa">
                    Editable
                    <input type="checkbox" name="" id="" checked>
                </div>
                <div class="atributoCapa">
                    visible
                    <input type="checkbox" name="" id="" checked>
                </div>

                <div class="atributoCapa">
                    opacidad
                    <input type="number" name="" id="" max="1" min="0" step="0.1">
                </div>
            </div>
            <div class="accionesCapa">
                <button type="button"></button>
            </div>
        </div>
    </div>

    <div class="seccionArriba">
        <div class="barraMenu">
            <button type="button" id="retrocederTrazo" onclick="revertirTrazo()">atras</button>
            <button type="button" id="recuperarTrazo" onclick="recuperarTrazo()">adeltante</button>
        </div>
        <div class="barraHerramientas">
            <select id="herramientas" oninput="tipoHerramienta = 'dibujo' , 
                                                categoriaHerramienta = 'herramientas' , 
                                                herramienta = document.getElementById('herramientas').value">
                <option value="undefined"> no seleccionar este sino es para cambiar herramienta</option>
            </select>
            <select id="pinceles" oninput="tipoHerramienta = 'dibujo' , 
                                           categoriaHerramienta = 'pinceles' , 
                                            herramienta = document.getElementById('pinceles').value">
                <option value="undefined"> no seleccionar este sino es para cambiar herramienta</option>
            </select>
            <select id="figuras" oninput="tipoHerramienta = 'dibujo' , 
                                          categoriaHerramienta = 'figuras' , 
                                          herramienta = document.getElementById('figuras').value">
                <option value="undefined"> no seleccionar este sino es para cambiar herramienta</option>
            </select>
            <div class="color">
                <p>colorPrincipal</p>
                <input type="color" name="" id="colorPrincipal"
                    onchange=" colorPrincipal = hexToRgb(document.getElementById('colorPrincipal').value)">
            </div>

            <div class="color">
                <p>colorSecundario</p>
                <input type="color" name="" id="colorSecundario"
                    onchange=" colorSecundario =  hexToRgb(document.getElementById('colorSecundario').value)">
            </div>
        </div>
    </div>

    <section class="lienzo">
        <div class="seccionIzquierda">

            <div class="configuracionLapizFondo">
                <div class="rango">
                    <p>grosor</p>
                    <input type="range" name="" min="1" value="1" max="200" step="1" id="grosor"
                        oninput="grosor = document.getElementById('grosor').value,
                                                                                                         document.getElementById('cartelGrosor').innerHTML = grosor">
                    <p id="cartelGrosor">1</p>
                </div>

                <div class="rango">
                    <p>opprin</p>
                    <input type="range" name="" min="0" value="1" max="1" step="0.01" id="opacidadPrincipal"
                        oninput="opacidadPrincipal = document.getElementById('opacidadPrincipal').value,
                                                                                                         document.getElementById('cartelOpacPrin').innerHTML = opacidadPrincipal">
                    <p id="cartelOpacPrin">1</p>
                </div>

                <div class="rango">
                    <p>opsecu</p>
                    <input type="range" name="" min="0" value="1" max="1" step="0.01" id="opacidadSecundaria"
                        oninput="opacidadSecundaria = document.getElementById('opacidadSecundaria').value,
                                                                                                         document.getElementById('cartelOpacSecu').innerHTML = opacidadPrincipal">
                    <p id="cartelOpacSecu">1</p>
                </div>

            </div>
            <div class="visualizacionHistorial"></div>
        </div>

        <canvas id="canvasPrincipal">

        </canvas> <input type="checkbox" name="" id="">

        <div class="seccionDerecha">
            <button type="button" id="agregarCapas" onclick="agregarCapa()">agregar capa</button>
            <form id="listaCapas" onchange="cambiarCapaActual(event)">


            </form>
            <div class="configurarCapas">

            </div>
        </div>
    </section>
    <div class="barraEstatus">

    </div>
    
    <script src="js/paint.js"></script>
    <script src="js/script.js"></script>
</body>

</html>
